<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Newsletter Builder — Block Club Chicago</title>
<style>
  :root {
    --ink: #17181c;
    --paper: #faf8f4;
    --rule: #dedad2;
    --accent: #b3312c;
    --muted: #6b6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  header {
    border-bottom: 3px solid var(--ink);
    padding: 28px 24px 0;
  }
  header h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 28px;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  header p {
    margin: 0 0 18px;
    color: var(--muted);
    font-size: 14px;
  }
  .tabs {
    display: flex;
    gap: 4px;
  }
  .tab-btn {
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: -3px;
  }
  .tab-btn.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  label {
    display: block;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="text"], textarea, select {
    width: 100%;
    font-size: 16px;
    font-family: inherit;
    padding: 10px 12px;
    border: 1px solid var(--rule);
    background: #fff;
    border-radius: 3px;
  }
  textarea {
    min-height: 140px;
    resize: vertical;
    line-height: 1.5;
  }
  .field { margin-bottom: 22px; }
  .hint { font-size: 13px; color: var(--muted); margin-top: 6px; }
  button.primary {
    background: var(--ink);
    color: #fff;
    border: none;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 3px;
    cursor: pointer;
  }
  button.primary:hover { background: #000; }
  button.primary:disabled { background: #999; cursor: not-allowed; }
  #status {
    margin: 18px 0;
    font-size: 14px;
  }
  #status.error { color: var(--accent); }
  #status.success { color: #1a6e3f; }
  .stories {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .story-card {
    display: flex;
    gap: 14px;
    border: 1px solid var(--rule);
    background: #fff;
    padding: 12px;
    border-radius: 4px;
  }
  .story-card img {
    width: 100px;
    height: 70px;
    object-fit: cover;
    border-radius: 3px;
    flex-shrink: 0;
    background: #eee;
  }
  .story-card .placeholder {
    width: 100px;
    height: 70px;
    flex-shrink: 0;
    background: #eee;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--muted);
  }
  .story-card .body { flex: 1; min-width: 0; }
  .story-card h3 {
    font-family: Georgia, serif;
    font-size: 16px;
    margin: 0 0 4px;
    line-height: 1.3;
  }
  .story-card .url {
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
  }
  .story-card.failed { border-color: var(--accent); }
  .story-card.failed .body { color: var(--accent); }
  .story-card.loading .body { color: var(--muted); }
  footer.result {
    margin-top: 28px;
    padding: 18px;
    border: 1px solid var(--rule);
    background: #fff;
    border-radius: 4px;
    font-size: 14px;
  }
  .editor-toolbar {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }
  .editor-toolbar button {
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--rule);
    font-size: 13px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
  }
  .editor-toolbar button:hover { background: #f0eee9; }
  .rich-editor {
    min-height: 80px;
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 10px 12px;
    background: #fff;
    font-size: 16px;
    line-height: 1.5;
  }
  .rich-editor:empty:before {
    content: attr(data-placeholder);
    color: #999;
  }
  .draft-list {
    border: 1px solid var(--rule);
    border-radius: 4px;
    background: #fff;
    max-height: 260px;
    overflow-y: auto;
  }
  .draft-row {
    padding: 10px 12px;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    font-size: 14px;
  }
  .draft-row:last-child { border-bottom: none; }
  .draft-row:hover { background: #f7f5f0; }
  .draft-row.selected { background: #eee7db; font-weight: 600; }
  .draft-row .date { color: var(--muted); font-size: 12px; font-weight: normal; }
  .ad-slot-card {
    border: 1px solid var(--rule);
    border-radius: 4px;
    background: #fff;
    padding: 16px;
    margin-bottom: 16px;
  }
  .ad-slot-card h4 {
    margin: 0 0 4px;
    font-size: 15px;
  }
  .ad-slot-card .current {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .ad-slot-card .field { margin-bottom: 14px; }
  .ad-slot-status { font-size: 13px; margin-top: 8px; }
  .ad-slot-status.success { color: #1a6e3f; }
  .ad-slot-status.error { color: var(--accent); }
  .ad-layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    margin-top: 20px;
  }
  .ad-preview-col {
    flex: 1 1 50%;
    min-width: 0;
    position: sticky;
    top: 20px;
  }
  .ad-slots-col {
    flex: 1 1 50%;
    min-width: 0;
  }
  @media (max-width: 900px) {
    .ad-layout { flex-direction: column; }
    .ad-preview-col { position: static; }
  }
</style>
</head>
<body>

<header>
  <h1>Newsletter Builder</h1>
  <p>Paste story links, get a draft campaign in ActiveCampaign.</p>
  <div class="tabs">
    <button type="button" class="tab-btn active" id="tabBuilderBtn">Newsletter Builder</button>
    <button type="button" class="tab-btn" id="tabAdBtn">Ad Insertion</button>
  </div>
</header>

<main>

<div id="builderView">
  <div class="field">
    <label for="campaignName">Campaign name</label>
    <input type="text" id="campaignName" placeholder="e.g. Morning Edition — July 7" />
  </div>

  <div class="field">
    <label for="listSelect">Send to list</label>
    <select id="listSelect"><option>Loading lists…</option></select>
  </div>

  <div class="field">
    <label for="templateSelect">Template (optional)</label>
    <select id="templateSelect"><option value="">Neighborhood Template</option></select>
    <div class="hint">
      Optional — pick one of your custom ActiveCampaign templates. Leave as "Use default design" for the built-in layout.
    </div>
    <div id="templateStatus" style="margin-top:8px;font-size:14px;"></div>
  </div>

  <div class="field">
    <label for="introEditor">Newsletter Topper</label>
    <div class="editor-toolbar">
      <button type="button" id="boldBtn" title="Bold"><b>B</b></button>
      <button type="button" id="linkBtn" title="Add link">Link</button>
      <button type="button" id="unlinkBtn" title="Remove link">Unlink</button>
    </div>
    <div id="introEditor" class="rich-editor" contenteditable="true" data-placeholder="Write or paste your topper here. If submitting without a topper, please leave this blank, and follow up with Hannah or your editor"></div>
  </div>

  <div class="field">
    <label for="links">Story links</label>
    <textarea id="links" placeholder="https://blockclubchicago.org/2026/07/07/example-story/&#10;https://blockclubchicago.org/2026/07/06/another-story/"></textarea>
    <div class="hint">One link per line, in the order you want them to appear.</div>
  </div>

  <button class="primary" id="buildBtn">Build newsletter</button>

  <div id="status"></div>
  <div class="stories" id="stories"></div>
  <div id="result"></div>
</div>

<div id="adView" style="display:none;">
  <div class="field">
    <label for="draftSelect">Find a draft newsletter</label>
    <select id="draftSelect"><option value="">Loading drafts…</option></select>
  </div>

  <div id="adSlotsHeading"></div>
  <div class="ad-layout" id="adLayout" style="display:none;">
    <div class="ad-preview-col" id="adPreviewCol"></div>
    <div class="ad-slots-col" id="adSlotsSection"></div>
  </div>
</div>

</main>

<script>
const buildBtn = document.getElementById('buildBtn');
const statusEl = document.getElementById('status');
const storiesEl = document.getElementById('stories');
const resultEl = document.getElementById('result');
const listSelect = document.getElementById('listSelect');
const templateSelect = document.getElementById('templateSelect');
const templateStatus = document.getElementById('templateStatus');
const introEditor = document.getElementById('introEditor');

// --- Tab switching ---
const tabBuilderBtn = document.getElementById('tabBuilderBtn');
const tabAdBtn = document.getElementById('tabAdBtn');
const builderView = document.getElementById('builderView');
const adView = document.getElementById('adView');

const mainEl = document.querySelector('main');

tabBuilderBtn.addEventListener('click', () => {
  tabBuilderBtn.classList.add('active');
  tabAdBtn.classList.remove('active');
  builderView.style.display = 'block';
  adView.style.display = 'none';
  mainEl.style.maxWidth = '720px';
});
tabAdBtn.addEventListener('click', () => {
  tabAdBtn.classList.add('active');
  tabBuilderBtn.classList.remove('active');
  adView.style.display = 'block';
  builderView.style.display = 'none';
  mainEl.style.maxWidth = '1100px';
});

document.getElementById('boldBtn').addEventListener('click', () => {
  introEditor.focus();
  document.execCommand('bold');
});
document.getElementById('linkBtn').addEventListener('click', () => {
  const url = prompt('Paste the link URL (must start with http:// or https://):');
  if (!url) return;
  introEditor.focus();
  document.execCommand('createLink', false, url);
});
document.getElementById('unlinkBtn').addEventListener('click', () => {
  introEditor.focus();
  document.execCommand('unlink');
});

function sanitizeIntroHtml(root) {
  const allowed = new Set(['B', 'STRONG', 'A', 'BR']);

  function walk(node) {
    let out = '';
    node.childNodes.forEach((child) => {
      if (child.nodeType === Node.TEXT_NODE) {
        out += child.textContent
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      } else if (child.nodeType === Node.ELEMENT_NODE) {
        const tag = child.tagName;
        if (tag === 'BR') {
          out += '<br>';
        } else if (tag === 'DIV' || tag === 'P') {
          const inner = walk(child);
          out += (out ? '<br>' : '') + inner;
        } else if (tag === 'A' && allowed.has(tag)) {
          let href = child.getAttribute('href') || '';
          if (!/^https?:\/\//i.test(href)) href = '';
          const inner = walk(child);
          out += href
            ? `<a href="${href.replace(/"/g, '&quot;')}" target="_blank" rel="noopener">${inner}</a>`
            : inner;
        } else if (allowed.has(tag)) {
          out += `<${tag.toLowerCase()}>${walk(child)}</${tag.toLowerCase()}>`;
        } else {
          out += walk(child);
        }
      }
    });
    return out;
  }

  return walk(root).trim();
}

function setStatus(msg, kind) {
  statusEl.textContent = msg;
  statusEl.className = kind || '';
}

async function loadLists() {
  try {
    const res = await fetch('/.netlify/functions/list-lists');
    const data = await res.json();
    if (!res.ok || !data.lists) {
      listSelect.innerHTML = `<option value="">Could not load lists</option>`;
      return;
    }
    listSelect.innerHTML = data.lists
      .map((l) => `<option value="${l.id}">${l.name}</option>`)
      .join('');
  } catch (err) {
    listSelect.innerHTML = `<option value="">Could not load lists</option>`;
  }
}

let allTemplates = [];

async function loadTemplates() {
  try {
    const res = await fetch('/.netlify/functions/list-templates');
    const data = await res.json();
    if (!res.ok || !data.templates) return;
    allTemplates = data.templates;
    if (data.templates.length === 0) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'No API-readable templates found';
      templateSelect.appendChild(opt);
      return;
    }
    data.templates.forEach((t) => {
      const opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.name;
      templateSelect.appendChild(opt);
    });
  } catch (err) {
    // Silent fail — template selection is optional.
  }
}

// Matches a list name to the best-fitting template by shared significant
// words (e.g. "Logan Square, Humboldt Park & Avondale" list ↔ "Logan Square"
// template). Ignores short/common words so things like "and" or "news"
// don't create false matches.
const IGNORED_WORDS = new Set(['news', 'newsletter', 'and', 'the', 'park']);

function normalizeToWords(str) {
  return (str || '')
    .toLowerCase()
    .replace(/[&,]/g, ' ')
    .split(/\s+/)
    .filter((w) => w.length > 3 && !IGNORED_WORDS.has(w));
}

function findBestTemplateMatch(listName) {
  const listWords = new Set(normalizeToWords(listName));
  let best = null;
  let bestScore = 0;
  allTemplates.forEach((t) => {
    const tWords = normalizeToWords(t.name);
    const score = tWords.filter((w) => listWords.has(w)).length;
    if (score > bestScore) {
      bestScore = score;
      best = t;
    }
  });
  return best;
}

function autoSelectTemplateForList() {
  const listName = listSelect.options[listSelect.selectedIndex]?.text;
  if (!listName || allTemplates.length === 0) return;
  const match = findBestTemplateMatch(listName);
  if (match) {
    templateSelect.value = match.id;
    templateSelect.dispatchEvent(new Event('change'));
  }
}

listSelect.addEventListener('change', autoSelectTemplateForList);

templateSelect.addEventListener('change', async () => {
  const id = templateSelect.value;
  if (!id) {
    templateStatus.innerHTML = '';
    return;
  }
  templateStatus.style.color = 'var(--muted)';
  templateStatus.textContent = 'Checking template…';
  try {
    const res = await fetch(`/.netlify/functions/get-template?id=${encodeURIComponent(id)}`);
    const data = await res.json();
    if (res.ok && data.content && !data.error) {
      templateStatus.style.color = '#1a6e3f';
      templateStatus.textContent = `✓ "${templateSelect.options[templateSelect.selectedIndex].text}" is ready to use`;
    } else {
      templateStatus.style.color = 'var(--accent)';
      templateStatus.textContent = `This template couldn't be loaded — try the default design instead.`;
    }
  } catch (err) {
    templateStatus.style.color = 'var(--accent)';
    templateStatus.textContent = `This template couldn't be loaded — try the default design instead.`;
  }
});

Promise.all([loadLists(), loadTemplates()]).then(() => {
  autoSelectTemplateForList();
});

function renderStoryCard(id, url) {
  const card = document.createElement('div');
  card.className = 'story-card loading';
  card.id = id;
  card.innerHTML = `
    <div class="placeholder">Loading…</div>
    <div class="body">
      <h3>Fetching story…</h3>
      <div class="url">${url}</div>
    </div>
  `;
  storiesEl.appendChild(card);
  return card;
}

function updateStoryCard(card, story) {
  if (!story.found) {
    card.className = 'story-card failed';
    card.querySelector('.placeholder')?.replaceWith(cardPlaceholder('Failed'));
    card.querySelector('h3').textContent = story.error || 'Could not resolve this link';
    return;
  }
  card.className = 'story-card';
  const imgHtml = story.image
    ? `<img src="${story.image}" alt="">`
    : `<div class="placeholder">No image</div>`;
  card.innerHTML = `
    ${imgHtml}
    <div class="body">
      <h3>${story.headline}</h3>
      <div class="url">${story.link || story.url}</div>
    </div>
  `;
}

function cardPlaceholder(text) {
  const d = document.createElement('div');
  d.className = 'placeholder';
  d.textContent = text;
  return d;
}

buildBtn.addEventListener('click', async () => {
  const campaignName = document.getElementById('campaignName').value.trim();
  const introText = sanitizeIntroHtml(introEditor);
  const listId = listSelect.value;
  const rawLinks = document.getElementById('links').value
    .split('\n')
    .map(l => l.trim())
    .filter(Boolean);

  storiesEl.innerHTML = '';
  resultEl.innerHTML = '';
  setStatus('');

  if (!campaignName) {
    setStatus('Give the campaign a name first.', 'error');
    return;
  }
  if (!listId) {
    setStatus('Choose a list to send to.', 'error');
    return;
  }
  if (rawLinks.length === 0) {
    setStatus('Paste at least one story link.', 'error');
    return;
  }

  buildBtn.disabled = true;
  setStatus(`Fetching ${rawLinks.length} ${rawLinks.length === 1 ? 'story' : 'stories'}…`);

  const cards = rawLinks.map((url, i) => renderStoryCard(`story-${i}`, url));

  const resolved = [];
  for (let i = 0; i < rawLinks.length; i++) {
    try {
      const res = await fetch('/.netlify/functions/fetch-story', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: rawLinks[i] }),
      });
      const data = await res.json();
      updateStoryCard(cards[i], data);
      if (data.found) resolved.push(data);
    } catch (err) {
      updateStoryCard(cards[i], { found: false, error: 'Network error', url: rawLinks[i] });
    }
  }

  if (resolved.length === 0) {
    setStatus('None of those links could be resolved. Nothing was sent to ActiveCampaign.', 'error');
    buildBtn.disabled = false;
    return;
  }

  if (resolved.length < rawLinks.length) {
    setStatus(`${resolved.length} of ${rawLinks.length} stories resolved. Building the draft with those — check the failed links above.`);
  } else {
    setStatus('All stories resolved. Creating the draft in ActiveCampaign…');
  }

  try {
    const res = await fetch('/.netlify/functions/create-campaign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ campaignName, introText, listId, templateId: templateSelect.value, stories: resolved }),
    });
    const data = await res.json();

    if (!data.success) {
      setStatus(`Error creating campaign: ${data.error}`, 'error');
    } else {
      setStatus('Draft campaign created.', 'success');
      resultEl.innerHTML = `
        <footer class="result">
          Draft "<strong>${campaignName}</strong>" was created in ActiveCampaign with ${resolved.length} ${resolved.length === 1 ? 'story' : 'stories'}.
          Open ActiveCampaign → Campaigns to review, edit, and send it.
          ${data.slotWarning ? `<p style="color:#b3312c;margin-top:10px;">${data.slotWarning}</p>` : ''}
        </footer>
      `;
    }
  } catch (err) {
    setStatus(`Error creating campaign: ${err.message}`, 'error');
  }

  buildBtn.disabled = false;
});

// ---------- Ad Insertion tab ----------

let allDrafts = [];
const draftSelect = document.getElementById('draftSelect');
const adSlotsSection = document.getElementById('adSlotsSection');
let selectedCampaignId = null;

async function loadDraftCampaigns() {
  try {
    const res = await fetch('/.netlify/functions/list-draft-campaigns');
    const data = await res.json();
    if (!res.ok || !data.campaigns) {
      draftSelect.innerHTML = '<option value="">Could not load drafts</option>';
      return;
    }
    allDrafts = data.campaigns;
    draftSelect.innerHTML =
      '<option value="">Select a draft…</option>' +
      allDrafts
        .map((d) => {
          const date = d.cdate ? new Date(d.cdate).toLocaleDateString() : '';
          return `<option value="${d.id}">${d.name}${date ? ' — ' + date : ''}</option>`;
        })
        .join('');
  } catch (err) {
    draftSelect.innerHTML = '<option value="">Could not load drafts</option>';
  }
}

// Load immediately on page load (not on tab click) so the dropdown is
// already populated the moment someone switches to this tab.
loadDraftCampaigns();

const adSlotsHeading = document.getElementById('adSlotsHeading');
const adPreviewCol = document.getElementById('adPreviewCol');
const adLayout = document.getElementById('adLayout');

draftSelect.addEventListener('change', () => {
  if (draftSelect.value) {
    selectDraft(draftSelect.value);
  } else {
    adSlotsHeading.innerHTML = '';
    adPreviewCol.innerHTML = '';
    adSlotsSection.innerHTML = '';
    adLayout.style.display = 'none';
  }
});

async function selectDraft(campaignId) {
  selectedCampaignId = campaignId;

  adLayout.style.display = 'none';
  adSlotsHeading.innerHTML = '<p class="hint">Loading ad slots…</p>';
  adPreviewCol.innerHTML = '';
  adSlotsSection.innerHTML = '';

  try {
    const res = await fetch(`/.netlify/functions/get-campaign-ad-slots?campaignId=${encodeURIComponent(campaignId)}`);
    const data = await res.json();

    if (!res.ok || data.error) {
      adSlotsHeading.innerHTML = `<p class="hint" style="color:var(--accent);">Could not load ad slots: ${data.error || 'unknown error'}</p>`;
      return;
    }

    if (!data.slots || data.slots.length === 0) {
      adSlotsHeading.innerHTML = `<p class="hint">No ad slots found in "${data.campaignName}". This draft may have been created before ad slots were supported, or its design doesn't include one.</p>`;
      return;
    }

    adSlotsHeading.innerHTML = `<h3 style="font-family:Georgia,serif;font-size:18px;margin:20px 0 4px;">Ad slots in "${data.campaignName}"</h3>`;
    adLayout.style.display = 'flex';

    const previewUrl = `/.netlify/functions/preview-campaign?campaignId=${encodeURIComponent(campaignId)}`;
    adPreviewCol.innerHTML = `
      <div class="hint" style="margin-bottom:6px;">
        Live preview of this draft as it currently looks —
        <a href="${previewUrl}" target="_blank" rel="noopener">open full-size in a new tab</a>
      </div>
      <iframe src="${previewUrl}" style="width:100%;height:600px;border:1px solid var(--rule);border-radius:4px;background:#fff;"></iframe>
    `;

    data.slots.forEach((slot, i) => {
      const card = document.createElement('div');
      card.className = 'ad-slot-card';
      card.innerHTML = `
        <h4>Slot: ${slot.slotId}</h4>
        <div class="current">${slot.description}</div>
        <div class="field">
          <label>Advertiser name</label>
          <input type="text" class="advertiserInput" placeholder="e.g. Half Acre Beer Co." />
        </div>
        <div class="field">
          <label>Image URL</label>
          <input type="text" class="imageInput" placeholder="https://…" />
        </div>
        <div class="field">
          <label>Link URL</label>
          <input type="text" class="linkInput" placeholder="https://…" />
        </div>
        <div class="field">
          <label>Caption text (optional)</label>
          <input type="text" class="captionInput" placeholder="Short line shown under the ad" />
        </div>
        <button class="primary saveAdBtn">Save ad</button>
        <div class="ad-slot-status"></div>
      `;
      adSlotsSection.appendChild(card);

      card.querySelector('.saveAdBtn').addEventListener('click', async () => {
        const advertiserName = card.querySelector('.advertiserInput').value.trim();
        const image = card.querySelector('.imageInput').value.trim();
        const link = card.querySelector('.linkInput').value.trim();
        const captionText = card.querySelector('.captionInput').value.trim();
        const statusDiv = card.querySelector('.ad-slot-status');

        if (!image || !link) {
          statusDiv.className = 'ad-slot-status error';
          statusDiv.textContent = 'Image URL and Link URL are required.';
          return;
        }

        statusDiv.className = 'ad-slot-status';
        statusDiv.textContent = 'Saving…';

        try {
          const res = await fetch('/.netlify/functions/update-campaign-ad', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messageId: data.messageId,
              slotId: slot.slotId,
              image,
              link,
              captionText,
              advertiserName,
            }),
          });
          const result = await res.json();
          if (!result.success) {
            statusDiv.className = 'ad-slot-status error';
            statusDiv.textContent = `Error: ${result.error}`;
          } else {
            statusDiv.className = 'ad-slot-status success';
            statusDiv.textContent = '✓ Ad saved. Open the draft in ActiveCampaign to review.';
          }
        } catch (err) {
          statusDiv.className = 'ad-slot-status error';
          statusDiv.textContent = `Error: ${err.message}`;
        }
      });
    });
  } catch (err) {
    adSlotsSection.innerHTML = `<p class="hint" style="color:var(--accent);">Could not load ad slots: ${err.message}</p>`;
  }
}
</script>

</body>
</html>
