<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Newsletter Builder — Block Club Chicago</title>
<style>
  :root {
    --ink: #17181c;
    --paper: #faf8f4;
    --rule: #dedad2;
    --accent: #b3312c;
    --muted: #6b6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  header {
    border-bottom: 3px solid var(--ink);
    padding: 28px 24px 18px;
  }
  header h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 28px;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  label {
    display: block;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="text"], textarea {
    width: 100%;
    font-size: 16px;
    font-family: inherit;
    padding: 10px 12px;
    border: 1px solid var(--rule);
    background: #fff;
    border-radius: 3px;
  }
  textarea {
    min-height: 140px;
    resize: vertical;
    line-height: 1.5;
  }
  .field { margin-bottom: 22px; }
  .hint { font-size: 13px; color: var(--muted); margin-top: 6px; }
  button {
    background: var(--ink);
    color: #fff;
    border: none;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 3px;
    cursor: pointer;
  }
  button:hover { background: #000; }
  button:disabled { background: #999; cursor: not-allowed; }
  #status {
    margin: 18px 0;
    font-size: 14px;
  }
  #status.error { color: var(--accent); }
  #status.success { color: #1a6e3f; }
  .stories {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .story-card {
    display: flex;
    gap: 14px;
    border: 1px solid var(--rule);
    background: #fff;
    padding: 12px;
    border-radius: 4px;
  }
  .story-card img {
    width: 100px;
    height: 70px;
    object-fit: cover;
    border-radius: 3px;
    flex-shrink: 0;
    background: #eee;
  }
  .story-card .placeholder {
    width: 100px;
    height: 70px;
    flex-shrink: 0;
    background: #eee;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--muted);
  }
  .story-card .body { flex: 1; min-width: 0; }
  .story-card h3 {
    font-family: Georgia, serif;
    font-size: 16px;
    margin: 0 0 4px;
    line-height: 1.3;
  }
  .story-card .url {
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
  }
  .story-card.failed { border-color: var(--accent); }
  .story-card.failed .body { color: var(--accent); }
  .story-card.loading .body { color: var(--muted); }
  footer.result {
    margin-top: 28px;
    padding: 18px;
    border: 1px solid var(--rule);
    background: #fff;
    border-radius: 4px;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <h1>Newsletter Builder</h1>
  <p>Paste story links, get a draft campaign in ActiveCampaign.</p>
</header>

<main>
  <div class="field">
    <label for="campaignName">Campaign name</label>
    <input type="text" id="campaignName" placeholder="e.g. Morning Edition — July 7" />
  </div>

  <div class="field">
    <label for="introText">Newsletter intro (optional)</label>
    <textarea id="introText" placeholder="A sentence or two to open the newsletter. Leave blank to skip." style="min-height:80px;"></textarea>
  </div>

  <div class="field">
    <label for="links">Story links</label>
    <textarea id="links" placeholder="https://blockclubchicago.org/2026/07/07/example-story/&#10;https://blockclubchicago.org/2026/07/06/another-story/"></textarea>
    <div class="hint">One link per line, in the order you want them to appear.</div>
  </div>

  <button id="buildBtn">Build newsletter</button>

  <div id="status"></div>
  <div class="stories" id="stories"></div>
  <div id="result"></div>
</main>

<script>
const buildBtn = document.getElementById('buildBtn');
const statusEl = document.getElementById('status');
const storiesEl = document.getElementById('stories');
const resultEl = document.getElementById('result');

function setStatus(msg, kind) {
  statusEl.textContent = msg;
  statusEl.className = kind || '';
}

function renderStoryCard(id, url) {
  const card = document.createElement('div');
  card.className = 'story-card loading';
  card.id = id;
  card.innerHTML = `
    <div class="placeholder">Loading…</div>
    <div class="body">
      <h3>Fetching story…</h3>
      <div class="url">${url}</div>
    </div>
  `;
  storiesEl.appendChild(card);
  return card;
}

function updateStoryCard(card, story) {
  if (!story.found) {
    card.className = 'story-card failed';
    card.querySelector('.placeholder')?.replaceWith(cardPlaceholder('Failed'));
    card.querySelector('h3').textContent = story.error || 'Could not resolve this link';
    return;
  }
  card.className = 'story-card';
  const imgHtml = story.image
    ? `<img src="${story.image}" alt="">`
    : `<div class="placeholder">No image</div>`;
  card.innerHTML = `
    ${imgHtml}
    <div class="body">
      <h3>${story.headline}</h3>
      <div class="url">${story.link || story.url}</div>
    </div>
  `;
}

function cardPlaceholder(text) {
  const d = document.createElement('div');
  d.className = 'placeholder';
  d.textContent = text;
  return d;
}

buildBtn.addEventListener('click', async () => {
  const campaignName = document.getElementById('campaignName').value.trim();
  const introText = document.getElementById('introText').value.trim();
  const rawLinks = document.getElementById('links').value
    .split('\n')
    .map(l => l.trim())
    .filter(Boolean);

  storiesEl.innerHTML = '';
  resultEl.innerHTML = '';
  setStatus('');

  if (!campaignName) {
    setStatus('Give the campaign a name first.', 'error');
    return;
  }
  if (rawLinks.length === 0) {
    setStatus('Paste at least one story link.', 'error');
    return;
  }

  buildBtn.disabled = true;
  setStatus(`Fetching ${rawLinks.length} ${rawLinks.length === 1 ? 'story' : 'stories'}…`);

  const cards = rawLinks.map((url, i) => renderStoryCard(`story-${i}`, url));

  const resolved = [];
  for (let i = 0; i < rawLinks.length; i++) {
    try {
      const res = await fetch('/.netlify/functions/fetch-story', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: rawLinks[i] }),
      });
      const data = await res.json();
      updateStoryCard(cards[i], data);
      if (data.found) resolved.push(data);
    } catch (err) {
      updateStoryCard(cards[i], { found: false, error: 'Network error', url: rawLinks[i] });
    }
  }

  if (resolved.length === 0) {
    setStatus('None of those links could be resolved. Nothing was sent to ActiveCampaign.', 'error');
    buildBtn.disabled = false;
    return;
  }

  if (resolved.length < rawLinks.length) {
    setStatus(`${resolved.length} of ${rawLinks.length} stories resolved. Building the draft with those — check the failed links above.`);
  } else {
    setStatus('All stories resolved. Creating the draft in ActiveCampaign…');
  }

  try {
    const res = await fetch('/.netlify/functions/create-campaign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ campaignName, introText, stories: resolved }),
    });
    const data = await res.json();

    if (!data.success) {
      setStatus(`Error creating campaign: ${data.error}`, 'error');
    } else {
      setStatus('Draft campaign created.', 'success');
      resultEl.innerHTML = `
        <footer class="result">
          Draft "<strong>${campaignName}</strong>" was created in ActiveCampaign with ${resolved.length} ${resolved.length === 1 ? 'story' : 'stories'}.
          Open ActiveCampaign → Campaigns to review, edit, and send it.
        </footer>
      `;
    }
  } catch (err) {
    setStatus(`Error creating campaign: ${err.message}`, 'error');
  }

  buildBtn.disabled = false;
});
</script>

</body>
</html>
